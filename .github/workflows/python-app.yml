# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: fluster

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  commit-validation:
    name: Validate commits
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install pre-commit
      run: pip install pre-commit==2.21.0

    - name: Install pre-commit hooks
      run: pre-commit install

    - name: Validate all commit messages
      run: |
        git fetch --prune --unshallow
        BASE_REF=${{ github.base_ref }}
        if [ -z "$BASE_REF" ]; then
          BASE_REF="master"
        fi
        git rev-list --no-merges origin/$BASE_REF..${{ github.sha }} > commits.txt
        while read commit; do
          echo "Validate commit: $commit"
          git show -s --format=%B $commit > commit-msg.txt
          pre-commit run conventional-pre-commit --hook-stage commit-msg --commit-msg-filename commit-msg.txt || exit 1
        done < commits.txt

    - name: Validate all files
      run: |
        pre-commit run --all-files --show-diff-on-failure

  min_linux:
    name: linux with min supported deps
    runs-on: ubuntu-22.04
    needs:
      - commit-validation

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.7
      uses: actions/setup-python@v5
      with:
        python-version: 3.7
    - name: Install dependencies
      run: |
        make install_deps
    - name: Check (Skipping H.266 due to old Ubuntu version)
      run: |
        SKIP_H266=1 make check
    - name: Test Build the wheel
      run: |
        pip wheel .

  linux:
    runs-on: ubuntu-24.04
    needs:
      - commit-validation

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: 3.13
    - name: Install FFmpeg with H.266 (precompiled)
      run: |
        wget -q https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
        tar -xf ffmpeg-release-amd64-static.tar.xz
        sudo mv ffmpeg-*-amd64-static/ffmpeg /usr/local/bin/
        sudo mv ffmpeg-*-amd64-static/ffprobe /usr/local/bin/
        rm -rf ffmpeg-* 
        echo "/usr/local/bin" >> $GITHUB_PATH
    - name: Build GStreamer with H.266 decoder
      run: |
        sudo apt update
        sudo apt install -y build-essential cmake ninja-build \
          libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
          libgstreamer-plugins-bad1.0-dev liborc-0.4-dev python3-pip
        
        pip3 install meson>=1.4
        
        git clone --depth 1 https://github.com/fraunhoferhhi/vvdec.git
        cd vvdec && mkdir build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr/local \
          -DVVDEC_INSTALL_VVDECAPP=OFF
        make -j$(nproc) && sudo make install && sudo ldconfig
        cd ../..
        
        git clone --depth 1 https://gitlab.freedesktop.org/gstreamer/gst-plugins-bad.git
        cd gst-plugins-bad
        meson setup build --prefix=/usr/local \
          --default-library=shared \
          -Dtests=disabled \
          -Dexamples=disabled \
          -Ddoc=disabled \
          -Dintrospection=disabled \
          -Dvvdec=enabled \
          -Dvvenc=disabled
        ninja -C build
        sudo ninja -C build install
        sudo ldconfig
        cd ..
        rm -rf gst-plugins-bad vvdec
    - name: Verify H.266 support
      run: |
        ffmpeg -version | head -1
        ffmpeg -decoders 2>/dev/null | grep -i vvc || echo "No VVC in FFmpeg"
        export GST_PLUGIN_PATH=/usr/local/lib/gstreamer-1.0:$GST_PLUGIN_PATH
        gst-inspect-1.0 vvdec || echo "No VVC decoder in GStreamer"
    - name: Install dependencies
      run: |
        make install_deps
    - name: Check
      run: |
        make check
    - name: Test Build the wheel
      run: |
        pip wheel .

  windows:
    runs-on: windows-latest
    needs:
      - commit-validation

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.7
      uses: actions/setup-python@v5
      with:
        python-version: 3.7
    - name: Install dependencies
      run: |
        make install_deps
    - name: Check
      run: |
        make check
    - name: Test Build the wheel
      run: |
        pip wheel .
